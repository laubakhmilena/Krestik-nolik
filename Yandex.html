<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Крестики-нолики</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="screen start-screen" id="startScreen" aria-labelledby="startTitle">
        <span class="shape shape-x" aria-hidden="true">✕</span>
        <span class="shape shape-o" aria-hidden="true">◯</span>

        <div class="content">
          <p class="eyebrow">Классическая игра для двоих</p>
          <h1 class="title" id="startTitle">Крестики-нолики</h1>
          <p class="subtitle">
            Выбирайте режим и начинайте весёлую партию в обновлённом ярком интерфейсе.
          </p>

          <button class="btn btn-primary cta-btn" id="startBtn" type="button">
            Начать играть
          </button>
        </div>
      </section>

      <section class="screen menu-screen hidden" id="menuScreen" aria-labelledby="menuTitle">
        <span class="shape shape-x second" aria-hidden="true">✕</span>
        <span class="shape shape-o second" aria-hidden="true">◯</span>

        <div class="content">
          <h2 class="title menu-title" id="menuTitle">Выберите режим игры</h2>

          <div class="mode-grid">
            <button class="mode-card" id="friendModeBtn" type="button">
              <span class="mode-card-title">Игра с другом</span>
              <span class="mode-card-text">Играть вдвоём на одном устройстве</span>
            </button>

            <button class="mode-card" type="button">
              <span class="mode-card-title">Игра с ботом</span>
              <span class="mode-card-text">Сразиться против компьютера</span>
            </button>
          </div>

          <button class="btn btn-secondary back-btn" id="backBtn" type="button">Назад</button>
        </div>
      </section>

      <section
        class="screen friend-game-screen hidden"
        id="friendGameScreen"
        aria-labelledby="friendGameTitle"
      >
        <span class="shape shape-x second" aria-hidden="true">✕</span>
        <span class="shape shape-o second" aria-hidden="true">◯</span>

        <div class="content friend-game-content">
          <h2 class="title game-title" id="friendGameTitle">Игра с другом</h2>

          <div class="status-panel" id="statusPanel" data-state="turn" aria-live="polite">
            <p class="status-caption">Статус партии</p>
            <p class="game-status" id="statusText">Ход: X</p>
          </div>

          <div class="score-board" id="scoreBoard" aria-label="Счёт матчей">
            <div class="score-item">
              <span class="score-label">X</span>
              <span class="score-value" id="scoreX">0</span>
            </div>
            <div class="score-item">
              <span class="score-label">O</span>
              <span class="score-value" id="scoreO">0</span>
            </div>
            <div class="score-item">
              <span class="score-label">Ничьи</span>
              <span class="score-value" id="scoreDraws">0</span>
            </div>
          </div>

          <div class="board" id="board" role="grid" aria-label="Поле крестиков-ноликов">
            <button class="cell" type="button" data-index="0" aria-label="Клетка 1"></button>
            <button class="cell" type="button" data-index="1" aria-label="Клетка 2"></button>
            <button class="cell" type="button" data-index="2" aria-label="Клетка 3"></button>
            <button class="cell" type="button" data-index="3" aria-label="Клетка 4"></button>
            <button class="cell" type="button" data-index="4" aria-label="Клетка 5"></button>
            <button class="cell" type="button" data-index="5" aria-label="Клетка 6"></button>
            <button class="cell" type="button" data-index="6" aria-label="Клетка 7"></button>
            <button class="cell" type="button" data-index="7" aria-label="Клетка 8"></button>
            <button class="cell" type="button" data-index="8" aria-label="Клетка 9"></button>
          </div>

          <div class="game-actions">
            <button class="btn btn-primary restart-btn" id="restartBtn" type="button">Играть снова</button>
            <button class="btn btn-secondary menu-btn" id="backToMenuBtn" type="button">
              Назад в меню
            </button>
            <button class="btn btn-secondary score-reset-btn" id="resetScoreBtn" type="button">
              Сбросить счёт
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
